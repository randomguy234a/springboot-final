# 1. Database Connection URL
# 'mysql-service' is the name of the Kubernetes service we will create.
# 'demo_db' is the database name.
spring.datasource.url=jdbc:mysql://mysql-service:3306/demo_db?createDatabaseIfNotExist=true

# 2. Authentication
# These use ${VARIABLE} syntax so Kubernetes can inject the values 
# from your ConfigMap (admin / admin321) into the app.
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# 3. Hibernate / JPA Settings
# 'update' automatically creates the tables in MySQL for you.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect