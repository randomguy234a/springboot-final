spring.application.name=springboot-final

# Connection to the K8s MySQL Service
spring.datasource.url=jdbc:mysql://mysql-service:3306/demo_db?createDatabaseIfNotExist=true

# Credentials injected from the ConfigMap
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true